name: Deploy RWE demo dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Regenerate deterministic demo artifacts
        run: python src/rwe_demo.py

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -R dashboard/. _site/
          mkdir -p _site/output _site/docs
          cp output/results.json output/balance.csv _site/output/
          cp docs/evidence_methods_packet.md docs/target_trial_protocol.md _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
